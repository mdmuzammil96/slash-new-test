name: Sample test pipeline

on:
  workflow_dispatch:
    inputs:
      head_ref:
        required: true
      head_sha:
        required: true

permissions:
  statuses: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_ref }}

      - name: Simulate tests
        run: |
          echo "✓ Running tests on branch: ${{ inputs.head_ref }}"
          echo "✓ Commit SHA: ${{ inputs.head_sha }}"
          echo "✓ All tests passed"
          # Uncomment to simulate failure:
          # exit 1

      - name: Post final status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATE="success"
          else
            STATE="failure"
          fi

          echo "Posting status: $STATE"

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ inputs.head_sha }} \
            -d "{\"state\":\"$STATE\",\"context\":\"slash-test\",\"description\":\"Tests $STATE\"}"
